<!doctype html>
<html lang="en-GB">
    <head>
        <meta charset="utf-8">
        <title><!-- TITLE --></title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js" type="text/javascript" charset="utf-8"></script>
        <link href="/system/webserver.css" rel="stylesheet" type="text/css" /> 
    </head>
    <body>
        <header><!-- TITLE --></header>
        <pre class="markdown">
<!-- CONTENT -->
        </pre>
        <script type="module">

            var converter = new showdown.Converter();
            converter.setOption("literalMidWordUnderscores", true);
            converter.setOption("tables", true);
            converter.setOption("tasklists", true);

            [...document.getElementsByClassName("markdown")].forEach(elem => {
                const html = converter.makeHtml(elem.textContent);
                elem.insertAdjacentHTML("afterend", html);
                elem.style.display = "none";
            });

            import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
            mermaid.initialize({ startOnLoad: false });
            await mermaid.run({
                querySelector: ".mermaid",
                postRenderCallback: (id) => {
                    const diagram = document.getElementById(id);
                    diagram.style.width = diagram.style["max-width"];
                    diagram.style["max-width"] = "100%";
                    diagram.style.cursor = "zoom-in";
                    diagram.addEventListener("click", () => {
                        if (diagram.style.cursor === "zoom-in") {
                            diagram.style["max-width"] = diagram.style.width;
                            diagram.style.cursor = "zoom-out";
                        } else {
                            diagram.style["max-width"] = "100%";
                            diagram.style.cursor = "zoom-in";
                        }
                    });
                }
            });
        </script>
    </body>
</html>
